- alias: "Cube Küche – Seite 1 – Bandit Rock"
  trigger:
    - platform: mqtt
      topic: zigbee2mqtt/MainHouse-Kitchen_cube/action
  condition:
    - condition: template
      value_template: "{{ trigger.payload in ['flip90', 'flip180'] and states('sensor.mainhouse_kitchen_cube_side') == '1' }}"
  action:
    - service: script.turn_on
      target:
        entity_id: script.yamaha_bandit_rock

