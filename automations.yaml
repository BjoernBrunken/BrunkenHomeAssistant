  - condition: state
    entity_id: input_boolean.hoflicht_override
    state:
    - 'off'
  actions:
  - type: turn_off
    device_id: 19249a4c4b96c8bc399e754341312909
    entity_id: 44ca9d4650f3b79d975be7057a775610
    domain: light
  mode: single
- id: '1765288497726'
  alias: Hoflicht 1 Stunde
  description: ''
  triggers:
  - trigger: event
    event_type: hoflicht_1h
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: state
        entity_id: light.gard_mainhouse_floodligt
        state: 'off'
      sequence:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.hoflicht_override
      - action: light.turn_on
        target:
          entity_id: light.gard_mainhouse_floodligt
      - delay:
          hours: 1
          minutes: 0
          seconds: 0
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.hoflicht_override
      - action: light.turn_off
        target:
          entity_id: light.gard_mainhouse_floodligt
    - conditions:
      - condition: state
        entity_id: light.gard_mainhouse_floodligt
        state: 'on'
      sequence:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.hoflicht_override
      - action: light.turn_off
        target:
          entity_id: light.gard_mainhouse_floodligt
  mode: single
