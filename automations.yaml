- id: ikea_terrasse_lauter
  alias: IKEA Terrasse – Lauter
  triggers:
  - domain: mqtt
    device_id: dc14ddd326019a3d0075359d08144aa9
    type: action
    subtype: brightness_up_click
    trigger: device
  conditions: []
  actions:
  - action: media_player.volume_set
    target:
      entity_id: media_player.terrasse
    data:
      volume_level: "{{ [[(state_attr('media_player.terrasse', 'volume_level') + 0.05), 0.0] | max, 1.0] | min }}"
  mode: single

- id: ikea_terrasse_leiser
  alias: IKEA Terrasse – Leiser
  triggers:
  - domain: mqtt
    device_id: dc14ddd326019a3d0075359d08144aa9
    type: action
    subtype: brightness_down_click
    trigger: device
  conditions: []
  actions:
  - action: media_player.volume_set
    target:
      entity_id: media_player.terrasse
    data:
      volume_level: "{{ [[(state_attr('media_player.terrasse', 'volume_level') - 0.05), 0.0] | max, 1.0] | min }}"
  mode: single