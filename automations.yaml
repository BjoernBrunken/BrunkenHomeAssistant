- id: '1772438573674'
  alias: Window_Ambient_Kitchen_ON
  description: Ambient-Licht in den Fensterleibungen einschalten (dezent), kurz vor
    Sonnenuntergang.
  triggers:
  - event: sunset
    offset: -00:20:00
    trigger: sun
  conditions:
  - condition: state
    entity_id: light.mainhouse_kitchen_ambient
    state:
    - 'off'
  actions:
  - data:
      brightness_pct: 15
    action: light.turn_on
    target:
      entity_id: light.mainhouse_kitchen_ambient
  mode: restart
- id: '1772438690524'
  alias: Window_Ambient_Kitchen_OFF
  description: Ambient-Licht in den Fensterleibungen ausschalten bei Sonnenaufgang.
  triggers:
  - event: sunrise
    offset: 00:10:00
    trigger: sun
  conditions:
  - condition: state
    state:
    - 'on'
    entity_id: light.mainhouse_kitchen_ambient
  actions:
  - action: light.turn_off
    data: {}
    target:
      entity_id: light.mainhouse_kitchen_ambient
  mode: restart
