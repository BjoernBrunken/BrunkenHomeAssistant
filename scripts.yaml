    - delay: "00:00:02"
    - service: media_player.select_source
      target:
        entity_id: media_player.yamaha_wohnzimmer
      data:
        source: "OPTICAL1"

kuche_toggle:
  alias: "Küche – An/Aus"
  sequence:
    - action: light.toggle
      target:
        entity_id: light.kuche_gesamt
  mode: single
  description: ""
  
yamaha_toggle_mit_radio:
  alias: "Yamaha – An/Aus mit Radio"
  sequence:
    - choose:
        - conditions:
            - condition: state
              entity_id: media_player.yamaha_wohnzimmer
              state: "off"
          sequence:
            - service: script.turn_on
              target:
                entity_id: script.yamaha_bandit_rock
      default:
        - service: media_player.turn_off
          target:
            entity_id: media_player.yamaha_wohnzimmer
  mode: single
