kuche_szene_wechseln:
  alias: Küche Szene wechseln
  sequence:
    - choose:
        - conditions:
            - condition: state
              entity_id: input_select.kuche_szene
              state: "kochen"
          sequence:
            - action: input_select.select_option
              target:
                entity_id: input_select.kuche_szene
              data:
                option: "essen"
            - action: scene.turn_on
              target:
                entity_id: scene.essen

        - conditions:
            - condition: state
              entity_id: input_select.kuche_szene
              state: "essen"
          sequence:
            - action: input_select.select_option
              target:
                entity_id: input_select.kuche_szene
              data:
                option: "abend"
            - action: scene.turn_on
              target:
                entity_id: scene.abend

        - conditions:
            - condition: state
              entity_id: input_select.kuche_szene
              state: "abend"
          sequence:
            - action: input_select.select_option
              target:
                entity_id: input_select.kuche_szene
              data:
                option: "kochen"
            - action: scene.turn_on
              target:
                entity_id: scene.kochen
  mode: single
  description: ""

yamaha_bandit_rock:
  alias: "Yamaha – Bandit Rock"
  sequence:
    - service: media_player.turn_on
      target:
        entity_id: media_player.yamaha_wohnzimmer
    - delay: "00:00:02"
    - service: media_player.select_source
      target:
        entity_id: media_player.yamaha_wohnzimmer
      data:
        source: "NET RADIO"
    - delay: "00:00:04"
    - service: media_player.play_media
      target:
        entity_id: media_player.yamaha_wohnzimmer
      data:
        media_content_type: "NET RADIO"
        media_content_id: "Bookmarks>Favoriten>Bandit Rock"

