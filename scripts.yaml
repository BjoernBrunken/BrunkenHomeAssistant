yamaha_volume_up:
  alias: "Yamaha – Lauter"
  mode: queued
  max: 10
  sequence:
    - service: media_player.volume_set
      target:
        entity_id: media_player.yamaha_wohnzimmer
      data:
        volume_level: "{{ state_attr('media_player.yamaha_wohnzimmer', 'volume_level') + 0.05 }}"

yamaha_volume_down:
  alias: "Yamaha – Leiser"
  mode: queued
  max: 10
  sequence:
    - service: media_player.volume_set
      target:
        entity_id: media_player.yamaha_wohnzimmer
      data:
        volume_level: "{{ state_attr('media_player.yamaha_wohnzimmer', 'volume_level') - 0.05 }}"

yamaha_input_chromecast:
